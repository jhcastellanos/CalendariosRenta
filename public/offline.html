<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Sin conexión · Calendarios Renta</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f7f8fa;
        color: #0f172a;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 28px;
        padding: 40px 32px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      .badge {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ff5a5f, #1a73e8);
        color: #fff;
      }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #475569; font-size: 15px; line-height: 1.5; margin: 0 0 24px; }
      button {
        appearance: none;
        border: none;
        cursor: pointer;
        background: #0f172a;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        padding: 12px 24px;
        border-radius: 9999px;
      }
      button:hover { background: #1e293b; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>Sin conexión</h1>
      <p>No pudimos cargar la página. Revisa tu conexión a internet e inténtalo de nuevo.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
