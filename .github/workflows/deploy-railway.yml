name: Build and Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Railway
        # This action will use your Railway API key and project id from repository secrets.
        # Set secrets: RAILWAY_API_KEY, RAILWAY_PROJECT_ID, and (optional) RAILWAY_ENVIRONMENT
        uses: railwayapp/railway-action@v1
        with:
          railwayToken: ${{ secrets.RAILWAY_API_KEY }}
          projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
          # environment defaults to "production" if not provided
          environment: ${{ secrets.RAILWAY_ENVIRONMENT || 'production' }}
