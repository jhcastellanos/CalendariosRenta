name: Build and Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Authenticate Railway CLI
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          # The Railway CLI will read the RAILWAY_API_KEY env var for non-interactive auth.
          # Print a short version to confirm it's present (do not print the full key).
          if [ -z "$RAILWAY_API_KEY" ]; then echo "Missing RAILWAY_API_KEY"; exit 1; fi
          echo "Railway API key provided"

      - name: Deploy with Railway CLI
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT || 'production' }}
        run: |
          # Attempt to deploy using the Railway CLI. Adjust commands below if your project uses a different workflow.
          # Common commands: `railway up` will try to deploy the current project. We pass the environment and project id.
          set -e
          echo "Deploying project $RAILWAY_PROJECT_ID to environment $RAILWAY_ENVIRONMENT"
          # Try a direct deploy; if your CLI requires linking first, update this step accordingly.
          npx @railway/cli up --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --yes || true
